<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>페이지를 찾을 수 없습니다 | Panda Blog</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --surface: #fff;
        --text: #22252a;
        --muted: #62676f;
        --accent: #177e89;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(560px, calc(100% - 36px));
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 0 16px;
        font-weight: 800;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid var(--text);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>주소가 바뀌었거나 아직 공개되지 않은 글일 수 있습니다.</p>
      <a href="https://mun-jeong-min.github.io/personal-blog/">Panda Blog 홈으로 이동</a>
    </main>
  </body>
</html>
