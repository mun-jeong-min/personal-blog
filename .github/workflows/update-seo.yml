name: Update SEO files

on:
  push:
    branches:
      - main
    paths:
      - "posts/**/*.html"
      - "templates/**/*.html"
      - "scripts/generate-seo.js"
      - "scripts/check-site.js"
      - "scripts/smoke-routes.js"
      - "site.config.json"
      - "index.html"
      - "404.html"
      - "robots.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-seo:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/generate-seo.js
      - run: node scripts/generate-seo.js --check
      - run: node scripts/check-site.js
      - run: node scripts/smoke-routes.js
      - name: Commit generated SEO files
        run: |
          if git diff --quiet; then
            echo "No SEO changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html posts.json sitemap.xml feed.xml robots.txt
          git commit -m "Update generated SEO files"
          git push
